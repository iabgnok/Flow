name: read_and_write_txt
description: 读取一个 txt 文件并写入另一个文件
version: '1.0'
inputs:
  input_file_path:
    type: string
    description: 输入 txt 文件路径
    required: true
    default:
  output_file_path:
    type: string
    description: 输出文件路径
    required: true
    default:
outputs:
  report_path:
    type: string
    description: 输出文件路径
    required: true
    default:
steps:
- id: 1
  name: 读取 txt 文件
  action: file_reader
  description: ''
  inputs:
    file_path: '{{input_file_path}}'
  outputs:
    file_content: file_content
  condition:
  on_fail:
  max_retries: 3
  workflow:
- id: 2
  name: 写入文件
  action: file_writer
  description: ''
  inputs:
    file_path: '{{output_file_path}}'
    content: '{{file_content}}'
  outputs:
    report_path: report_path
    bytes_written: bytes_written
  condition:
  on_fail:
  max_retries: 3
  workflow:
