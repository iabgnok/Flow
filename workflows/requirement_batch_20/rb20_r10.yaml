name: python_code_refactor
description: 对Python代码进行静态分析、重构、补写文档和单元测试
version: '1.0'
inputs:
  source_path:
    type: string
    description: Python源代码文件路径
    required: true
    default:
  output_code_path:
    type: string
    description: 重构后代码输出路径
    required: true
    default:
  output_test_path:
    type: string
    description: 单元测试文件输出路径
    required: true
    default:
outputs:
  refactored_code_path:
    type: string
    description: 重构后的代码文件路径
    required: true
    default:
  test_file_path:
    type: string
    description: 生成的单元测试文件路径
    required: true
    default:
steps:
- id: 1
  name: 读取Python源代码
  action: file_reader
  description: ''
  inputs:
    file_path: '{{source_path}}'
  outputs:
    code: file_content
  condition:
  on_fail:
  max_retries: 3
  workflow:
- id: 2
  name: 静态分析识别问题
  action: llm_analyze
  description: ''
  inputs:
    content: '{{code}}'
    instruction: 
      对这段Python代码进行静态分析，识别：1.潜在bug（如空指针、逻辑错误、边界条件）2.代码异味（如重复代码、过长函数、复杂条件）3.PEP8规范违反项（如命名、缩进、行长度）4.缺少的文档字符串。按这四个方面结构化输出。
  outputs:
    analysis: analysis_result
  condition:
  on_fail:
  max_retries: 3
  workflow:
- id: 3
  name: 重构代码
  action: llm_generate
  description: ''
  inputs:
    instruction: 基于以下分析结果，按照PEP8规范重构这段Python代码。修复所有识别出的问题，包括：1.修正潜在bug 2.消除代码异味 
      3.遵循PEP8规范 4.为所有函数和类添加完整的docstring。只输出重构后的完整代码，不要包含额外解释。
    context: "原始代码：{{code}}\n\n分析结果：{{analysis}}"
  outputs:
    refactored_code: generated_text
  condition:
  on_fail:
  max_retries: 3
  workflow:
- id: 4
  name: 验证重构质量
  action: llm_verify
  description: ''
  inputs:
    artifact: '{{refactored_code}}'
    criteria: 重构后的代码必须：1.基于原始代码逻辑，不得替换为无关主题 2.修复分析中识别的所有问题 3.遵循PEP8规范 
      4.包含完整的docstring 5.保持原始功能不变。代码中不得出现未替换的{...}或<待填写>占位符。
  outputs:
    verify_result: verify_result
    passed: passed
  condition:
  on_fail: 3
  max_retries: 2
  workflow:
- id: 5
  name: 生成单元测试
  action: llm_generate
  description: ''
  inputs:
    instruction: 为以下重构后的Python代码生成完整的单元测试。测试应覆盖：1.所有函数的主要功能 2.边界条件 
      3.异常情况。使用pytest框架，测试文件名应与原文件对应（如原文件为module.py，测试文件为test_module.py）。只输出测试代码，不要额外解释。
    context: 重构后的代码：{{refactored_code}}
  outputs:
    test_code: generated_text
  condition:
  on_fail:
  max_retries: 3
  workflow:
- id: 6
  name: 验证测试质量
  action: llm_verify
  description: ''
  inputs:
    artifact: '{{test_code}}'
    criteria: 单元测试必须：1.针对重构代码中的函数和类编写 2.使用pytest框架 3.包含合理的测试用例 
      4.测试文件名格式正确（test_*.py）。测试代码中不得出现未替换的{...}或<待填写>占位符。
  outputs:
    test_verify_result: verify_result
    test_passed: passed
  condition:
  on_fail: 5
  max_retries: 2
  workflow:
- id: 7
  name: 保存重构代码
  action: file_writer
  description: ''
  inputs:
    file_path: '{{output_code_path}}'
    content: '{{refactored_code}}'
  outputs:
    refactored_code_path: report_path
    bytes_written: bytes_written
  condition:
  on_fail:
  max_retries: 3
  workflow:
- id: 8
  name: 保存单元测试
  action: file_writer
  description: ''
  inputs:
    file_path: '{{output_test_path}}'
    content: '{{test_code}}'
  outputs:
    test_file_path: report_path
    bytes_written: bytes_written
  condition:
  on_fail:
  max_retries: 3
  workflow:
