name: python_code_refactor_and_test
description: 对Python代码进行静态分析、PEP8重构、补写docstring和单元测试
version: '1.0'
inputs:
  source_path:
    type: string
    description: Python源代码文件路径
    required: true
    default:
  output_code_path:
    type: string
    description: 重构后代码输出路径
    required: true
    default:
  output_test_path:
    type: string
    description: 单元测试文件输出路径
    required: true
    default:
outputs:
  refactored_code_path:
    type: string
    description: 重构后的代码文件路径
    required: true
    default:
  test_file_path:
    type: string
    description: 生成的单元测试文件路径
    required: true
    default:
steps:
- id: 1
  name: 读取Python代码
  action: file_reader
  description: ''
  inputs:
    file_path: '{{source_path}}'
  outputs:
    source_code: file_content
  condition:
  on_fail:
  max_retries: 3
  workflow:
- id: 2
  name: 静态分析并列出问题清单
  action: llm_analyze
  description: ''
  inputs:
    content: '{{source_code}}'
    instruction: |
      对以下Python代码做静态分析并输出问题清单：
      1) 潜在 bug（异常未处理、逻辑错误、边界条件）
      2) 代码异味（过长函数、重复代码、复杂条件）
      3) PEP8/可读性问题（命名、行长度、缩进等）
      输出为条目清单即可，不要输出重构后的完整代码。
  outputs:
    issues_report: analysis_result
    analysis_confidence: confidence
  condition:
  on_fail:
  max_retries: 3
  workflow:
- id: 3
  name: PEP8重构并输出完整代码
  action: llm_generate
  description: ''
  inputs:
    instruction: |
      基于参考资料中的原始代码与问题清单，对代码进行PEP8与可读性重构并输出“完整可运行”的Python代码。
      要求：
      - 保持原有功能不变
      - 不要更换为无关的新模块/新主题
      - 不要随意重命名对外可见的函数/类（除非明显拼写错误且能保持兼容）
      - 直接输出最终代码正文（不要解释过程）
    context: |
      【原始代码】
      {{source_code}}

      ---

      【问题清单】
      {{issues_report}}
  outputs:
    refactored_code: generated_text
  condition:
  on_fail:
  max_retries: 3
  workflow:
- id: 4
  name: 验证重构代码（基础门禁）
  action: llm_verify
  description: ''
  inputs:
    artifact: '{{refactored_code}}'
    criteria: |
      必须是完整的Python代码文本；不得为空；
      不含未替换的占位符（如 {{...}}、{{{{...}}}}、<待填写>、TBD 等）。
  outputs:
    refactor_verify_result: verify_result
    refactor_passed: passed
  condition:
  on_fail: 3
  max_retries: 2
  workflow:
- id: 5
  name: 补写docstring
  action: llm_generate
  description: ''
  inputs:
    instruction: |
      为以下Python代码的所有函数和类补写docstring，遵循Google风格文档字符串格式，
      包含参数说明、返回值说明和可能的异常说明。直接输出补全后的完整代码。
    context: '{{refactored_code}}'
  outputs:
    code_with_docstring: generated_text
  condition:
  on_fail:
  max_retries: 3
  workflow:
- id: 6
  name: 验证docstring（基础门禁）
  action: llm_verify
  description: ''
  inputs:
    artifact: '{{code_with_docstring}}'
    criteria: |
      代码必须是完整的Python代码；不得为空；
      不含未替换的占位符（如 {{...}}、{{{{...}}}}、<待填写>、TBD 等）。
  outputs:
    docstring_verify_result: verify_result
    docstring_passed: passed
  condition:
  on_fail: 5
  max_retries: 2
  workflow:
- id: 7
  name: 生成单元测试
  action: llm_generate
  description: ''
  inputs:
    instruction: |
      为以下Python代码生成一个pytest单元测试文件，要求：
      1) 包含必要的import语句（import路径与符号名必须与代码中实际存在的名称一致）
      2) 每个可测试的函数至少一个测试用例
      3) 使用assert
      4) 覆盖至少一个边界条件或异常情况
      直接输出完整测试文件代码（不要解释）。
    context: '{{code_with_docstring}}'
  outputs:
    test_code: generated_text
  condition:
  on_fail:
  max_retries: 3
  workflow:
- id: 8
  name: 验证测试代码（基础门禁）
  action: llm_verify
  description: ''
  inputs:
    artifact: '{{test_code}}'
    criteria: |
      测试代码必须是完整的Python文件文本；不得为空；
      包含至少一个以 test_ 开头的测试函数；包含 assert；
      不含未替换的占位符（如 {{...}}、{{{{...}}}}、<待填写>、TBD 等）。
  outputs:
    test_verify_result: verify_result
    test_passed: passed
  condition:
  on_fail: 7
  max_retries: 2
  workflow:
- id: 9
  name: 保存重构代码
  action: file_writer
  description: ''
  inputs:
    file_path: '{{output_code_path}}'
    content: '{{code_with_docstring}}'
  outputs:
    refactored_code_path: report_path
    code_bytes: bytes_written
  condition:
  on_fail:
  max_retries: 3
  workflow:
- id: 10
  name: 保存测试文件
  action: file_writer
  description: ''
  inputs:
    file_path: '{{output_test_path}}'
    content: '{{test_code}}'
  outputs:
    test_file_path: report_path
    test_bytes: bytes_written
  condition:
  on_fail:
  max_retries: 3
  workflow:
