name: customer_review_sentiment_analysis
description: 读取客户评价CSV文件，进行情感分析并标注正面/负面/中性，输出新的CSV表格
version: '1.0'
inputs:
  input_csv_path:
    type: string
    description: 输入CSV文件路径
    required: true
    default:
  output_csv_path:
    type: string
    description: 输出CSV文件路径
    required: true
    default:
outputs:
  output_csv_path:
    type: string
    description: 输出CSV文件路径
    required: true
    default:
steps:
- id: 1
  name: 读取CSV文件
  action: file_reader
  description: ''
  inputs:
    file_path: '{{input_csv_path}}'
  outputs:
    csv_content: file_content
  condition:
  on_fail:
  max_retries: 3
  workflow:
- id: 2
  name: 情感分析
  action: llm_analyze
  description: ''
  inputs:
    content: '{{csv_content}}'
    instruction: 
      分析这份客户评价CSV文件，为每条评价标注情感倾向：正面、负面或中性。请输出一个包含原始数据和新增'sentiment'列的新CSV格式，确保格式正确可直接保存为CSV文件。
  outputs:
    analyzed_csv: analysis_result
    confidence: confidence
  condition:
  on_fail:
  max_retries: 3
  workflow:
- id: 3
  name: 验证CSV格式
  action: llm_verify
  description: ''
  inputs:
    artifact: '{{analyzed_csv}}'
    criteria: 
      验证输出是否为有效的CSV格式，包含原始数据列和新增的'sentiment'列，情感标注应为'正面'、'负面'或'中性'之一，且每行数据完整。
  outputs:
    verify_result: verify_result
    passed: passed
  condition:
  on_fail: 2
  max_retries: 2
  workflow:
- id: 4
  name: 保存标注后的CSV
  action: file_writer
  description: ''
  inputs:
    file_path: '{{output_csv_path}}'
    content: '{{analyzed_csv}}'
  outputs:
    output_csv_path: report_path
    bytes_written: bytes_written
  condition:
  on_fail:
  max_retries: 3
  workflow:
