name: research_report_analysis
description: 分析长篇研报，按章节拆分、生成摘要、提取核心数据和结论，输出结构化投研要点速览文档
version: '1.0'
inputs:
  source_path:
    type: string
    description: 研报文件路径
    required: true
    default:
  output_path:
    type: string
    description: 输出文档路径
    required: true
    default:
outputs:
  report_path:
    type: string
    description: 生成的投研要点速览文档路径
    required: true
    default:
steps:
- id: 1
  name: 读取研报
  action: file_reader
  description: ''
  inputs:
    file_path: '{{source_path}}'
  outputs:
    report_content: file_content
  condition:
  on_fail:
  max_retries: 3
  workflow:
- id: 2
  name: 按章节拆分并分析
  action: llm_analyze
  description: ''
  inputs:
    content: '{{report_content}}'
    instruction: "请按以下要求分析这篇研报：1.识别并列出所有章节标题和起止位置；2.为每个章节生成简要摘要（每章2-3句话）；3.提取全文中出现的核心数据（如财务指标、增长率、市场份额等）；4.总结主要结论和投资建议。请按以下结构化格式输出：##
      章节拆分\n[章节标题1]：摘要内容\n[章节标题2]：摘要内容\n...\n## 核心数据\n- 数据1：说明\n- 数据2：说明\n...\n##
      主要结论\n- 结论1\n- 结论2\n..."
  outputs:
    structured_analysis: analysis_result
  condition:
  on_fail:
  max_retries: 3
  workflow:
- id: 3
  name: 生成结构化速览文档
  action: llm_generate
  description: ''
  inputs:
    instruction: 
      基于以下分析结果，生成一份结构化的投研要点速览文档。文档应包含：1.研报基本信息（假设标题为输入文件名称）；2.章节摘要汇总；3.核心数据表格；4.投资结论与建议。要求格式清晰、重点突出、便于快速阅读。
    context: '{{structured_analysis}}'
  outputs:
    summary_document: generated_text
  condition:
  on_fail:
  max_retries: 3
  workflow:
- id: 4
  name: 验证文档质量
  action: llm_verify
  description: ''
  inputs:
    artifact: '{{summary_document}}'
    criteria: 
      验证文档是否包含以下要素：1.章节摘要部分（至少2个章节）；2.核心数据部分（至少3个关键数据）；3.投资结论部分（至少2条明确建议）。文档必须基于输入研报内容生成，不得包含与研报无关的虚构信息。
  outputs:
    verify_result: verify_result
    passed: passed
  condition:
  on_fail: 3
  max_retries: 2
  workflow:
- id: 5
  name: 保存速览文档
  action: file_writer
  description: ''
  inputs:
    file_path: '{{output_path}}'
    content: '{{summary_document}}'
  outputs:
    report_path: report_path
    bytes_written: bytes_written
  condition:
  on_fail:
  max_retries: 3
  workflow:
