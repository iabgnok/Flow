name: course_localization
description: 对英文课程素材进行本地化：翻译讲义、字幕、测验题，进行文化适配，校验术语一致性，生成术语表和报告，输出全套本地化素材包
version: '1.0'
inputs:
  source_dir:
    type: string
    description: 英文课程素材目录路径（包含讲义Markdown、字幕SRT、题库JSON等）
    required: true
    default:
  output_dir:
    type: string
    description: 本地化素材包输出目录路径
    required: true
    default:
outputs:
  localized_package_path:
    type: string
    description: 本地化素材包目录路径
    required: true
    default:
  terminology_report_path:
    type: string
    description: 术语表和翻译质量报告文件路径
    required: true
    default:
steps:
- id: 1
  name: 读取课程素材
  action: file_reader
  description: ''
  inputs:
    paths: '{{source_dir}}'
  outputs:
    course_materials: file_content
  condition:
  on_fail:
  max_retries: 3
  workflow:
- id: 2
  name: 翻译讲义并文化适配
  action: llm_generate
  description: ''
  inputs:
    instruction: 
      将以下英文课程讲义翻译为中文，并进行文化本地化调整：替换不适合中国语境的例子、调整表达方式使其更符合中文学习习惯、保持专业术语准确。输出完整的中文讲义。
    context: '{{course_materials}}'
  outputs:
    localized_lecture: generated_text
  condition:
  on_fail:
  max_retries: 3
  workflow:
- id: 3
  name: 翻译字幕并调整时间轴
  action: llm_generate
  description: ''
  inputs:
    instruction: 
      将以下SRT字幕文件翻译为中文，并调整断句和时间轴：确保中文字幕与英文原句时间轴匹配，断句自然，每行字幕长度适中。输出完整的中文SRT格式。
    context: '{{course_materials}}'
  outputs:
    localized_subtitles: generated_text
  condition:
  on_fail:
  max_retries: 3
  workflow:
- id: 4
  name: 翻译并改编测验题
  action: llm_generate
  description: ''
  inputs:
    instruction: 
      将以下JSON格式的测验题库翻译为中文，并重新设计干扰项：保持原题意图，但干扰项要符合中文学习者的常见误区，题目表述要清晰自然。输出完整的中文JSON题库。
    context: '{{course_materials}}'
  outputs:
    localized_quizzes: generated_text
  condition:
  on_fail:
  max_retries: 3
  workflow:
- id: 5
  name: 术语一致性校验
  action: llm_verify
  description: ''
  inputs:
    artifact: "讲义：{{localized_lecture}}\n\n字幕：{{localized_subtitles}}\n\n测验题：{{localized_quizzes}}"
    criteria: 检查所有翻译内容中的专业术语是否一致：同一英文术语在讲义、字幕、测验题中必须使用相同的中文翻译。发现不一致时列出具体术语和出现位置。
  outputs:
    consistency_check: verify_result
    passed: passed
  condition:
  on_fail: 2
  max_retries: 2
  workflow:
- id: 6
  name: 生成术语表和报告
  action: llm_generate
  description: ''
  inputs:
    instruction: 
      基于以下翻译内容和一致性检查结果，生成：1.课程专业术语表（英文-中文对照）2.翻译质量自检报告（包括文化适配情况、术语一致性、翻译准确性评估）。要求结构清晰，便于后续审校。
    context: "讲义：{{localized_lecture}}\n字幕：{{localized_subtitles}}\n测验题：{{localized_quizzes}}\n\
      一致性检查：{{consistency_check}}"
  outputs:
    terminology_report: generated_text
  condition:
  on_fail:
  max_retries: 3
  workflow:
- id: 7
  name: 保存本地化素材包
  action: file_writer
  description: ''
  inputs:
    file_path: '{{output_dir}}/localized_lecture.md'
    content: '{{localized_lecture}}'
  outputs:
    lecture_path: report_path
    lecture_bytes: bytes_written
  condition:
  on_fail:
  max_retries: 3
  workflow:
- id: 8
  name: 保存本地化字幕
  action: file_writer
  description: ''
  inputs:
    file_path: '{{output_dir}}/localized_subtitles.srt'
    content: '{{localized_subtitles}}'
  outputs:
    subtitles_path: report_path
    subtitles_bytes: bytes_written
  condition:
  on_fail:
  max_retries: 3
  workflow:
- id: 9
  name: 保存本地化题库
  action: file_writer
  description: ''
  inputs:
    file_path: '{{output_dir}}/localized_quizzes.json'
    content: '{{localized_quizzes}}'
  outputs:
    quizzes_path: report_path
    quizzes_bytes: bytes_written
  condition:
  on_fail:
  max_retries: 3
  workflow:
- id: 10
  name: 保存术语表和报告
  action: file_writer
  description: ''
  inputs:
    file_path: '{{output_dir}}/terminology_and_quality_report.md'
    content: '{{terminology_report}}'
  outputs:
    report_path: report_path
    report_bytes: bytes_written
  condition:
  on_fail:
  max_retries: 3
  workflow:
