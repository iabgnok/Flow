name: resume_jd_matching
description: 提取简历关键信息结构化，与JD要求逐项匹配打分，生成候选人评估报告
version: '1.0'
inputs:
  resume_path:
    type: string
    description: 简历PDF文件路径
    required: true
    default:
  jd_path:
    type: string
    description: 岗位JD文件路径
    required: true
    default:
  output_path:
    type: string
    description: 评估报告输出路径
    required: true
    default:
outputs:
  report_path:
    type: string
    description: 生成的评估报告文件路径
    required: true
    default:
steps:
- id: 1
  name: 读取简历文件
  action: file_reader
  description: ''
  inputs:
    file_path: '{{resume_path}}'
  outputs:
    resume_content: file_content
  condition:
  on_fail:
  max_retries: 3
  workflow:
- id: 2
  name: 读取JD文件
  action: file_reader
  description: ''
  inputs:
    file_path: '{{jd_path}}'
  outputs:
    jd_content: file_content
  condition:
  on_fail:
  max_retries: 3
  workflow:
- id: 3
  name: 结构化提取简历信息
  action: llm_analyze
  description: ''
  inputs:
    content: '{{resume_content}}'
    instruction: 
      从简历中提取关键信息并结构化，包括：1.个人信息（姓名、联系方式）2.教育背景（学校、专业、学历、时间）3.工作经历（公司、职位、时间、主要职责）4.技能专长（技术栈、证书、语言能力）5.项目经验（项目名称、角色、技术栈、成果）。请以结构化JSON格式输出。
  outputs:
    resume_structured: analysis_result
    resume_confidence: confidence
  condition:
  on_fail:
  max_retries: 3
  workflow:
- id: 4
  name: 简历与JD匹配分析
  action: llm_analyze
  description: ''
  inputs:
    content: "简历结构化信息：{{resume_structured}}\n\n岗位JD内容：{{jd_content}}"
    instruction: 
      将简历信息与岗位JD要求逐项匹配打分，包括：1.教育背景匹配度（0-10分）2.工作经验匹配度（0-10分）3.技能匹配度（0-10分）4.项目经验匹配度（0-10分）5.综合匹配度（0-10分）。对每个匹配项给出具体说明和评分理由。
  outputs:
    matching_analysis: analysis_result
    matching_confidence: confidence
  condition:
  on_fail:
  max_retries: 3
  workflow:
- id: 5
  name: 生成评估报告
  action: llm_generate
  description: ''
  inputs:
    instruction: 基于简历结构化信息和匹配分析结果，生成一份专业的候选人评估报告。报告应包括：1.候选人基本信息 
      2.与JD匹配度分析（各项评分及说明）3.优势分析 4.潜在风险/不足 5.推荐建议（是否推荐面试及理由）。
    context: "简历结构化信息：{{resume_structured}}\n\n匹配分析结果：{{matching_analysis}}"
  outputs:
    assessment_report: generated_text
  condition:
  on_fail:
  max_retries: 3
  workflow:
- id: 6
  name: 验证报告质量
  action: llm_verify
  description: ''
  inputs:
    artifact: '{{assessment_report}}'
    criteria: 评估报告必须包含以下所有部分：1.候选人基本信息 2.与JD匹配度分析 3.优势分析 4.潜在风险/不足 
      5.推荐建议。报告内容必须基于给定的简历信息和匹配分析结果，不得虚构或替换为无关内容。
  outputs:
    verify_result: verify_result
    passed: passed
  condition:
  on_fail: 5
  max_retries: 2
  workflow:
- id: 7
  name: 保存评估报告
  action: file_writer
  description: ''
  inputs:
    file_path: '{{output_path}}'
    content: '{{assessment_report}}'
  outputs:
    report_path: report_path
    bytes_written: bytes_written
  condition:
  on_fail:
  max_retries: 3
  workflow:
