name: multi_platform_marketing_copy
description: 根据产品名称和核心卖点，生成小红书、微博、朋友圈三个平台的营销文案
version: '1.0'
inputs:
  product_name:
    type: string
    description: 产品名称
    required: true
    default:
  core_selling_points:
    type: string
    description: 核心卖点
    required: true
    default:
  output_path:
    type: string
    description: 输出文件路径
    required: true
    default:
outputs:
  report_path:
    type: string
    description: 生成的营销文案文件路径
    required: true
    default:
steps:
- id: 1
  name: 生成多平台营销文案
  action: llm_generate
  description: ''
  inputs:
    instruction: "根据以下产品信息，为小红书、微博、朋友圈三个平台分别生成适合的营销文案。要求：\n1. 小红书：突出种草感，使用emoji，语气亲切，适合女性用户\n\
      2. 微博：简洁有力，适合快速传播，可带话题标签\n3. 朋友圈：生活化分享，真实感强，适合熟人社交\n\n请按以下格式输出：\n## 小红书文案\n\
      [文案内容]\n\n## 微博文案\n[文案内容]\n\n## 朋友圈文案\n[文案内容]"
    context: "产品名称：{{product_name}}\n核心卖点：{{core_selling_points}}"
  outputs:
    marketing_copies: generated_text
  condition:
  on_fail:
  max_retries: 3
  workflow:
- id: 2
  name: 验证文案质量
  action: llm_verify
  description: ''
  inputs:
    artifact: '{{marketing_copies}}'
    criteria: "检查以下内容：\n1. 是否包含三个平台的文案（小红书、微博、朋友圈）\n2. 每个文案是否基于给定的产品名称和核心卖点\n3. 文案风格是否符合各平台特点（小红书种草感、微博简洁、朋友圈生活化）\n\
      4. 文案中不得出现与产品无关的其他品牌或产品信息"
  outputs:
    verify_result: verify_result
    passed: passed
  condition:
  on_fail: 1
  max_retries: 2
  workflow:
- id: 3
  name: 保存营销文案
  action: file_writer
  description: ''
  inputs:
    file_path: '{{output_path}}'
    content: "# {{product_name}} 多平台营销文案\n\n{{marketing_copies}}\n\n---\n\n**产品信息**\n\
      - 产品名称：{{product_name}}\n- 核心卖点：{{core_selling_points}}\n\n**生成时间**：{{now()}}"
  outputs:
    report_path: report_path
    bytes_written: bytes_written
  condition:
  on_fail:
  max_retries: 3
  workflow:
