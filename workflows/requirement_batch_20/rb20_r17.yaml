name: industry_research_report
description: 
  基于行业关键词和多份企业年报PDF，提取财务摘要和战略描述，进行行业横向对比分析，识别趋势风险，生成SWOT分析，最终产出图文并茂的行业研究报告
version: '1.0'
inputs:
  industry_keyword:
    type: string
    description: 行业关键词，如'新能源汽车'、'人工智能'等
    required: true
    default:
  pdf_paths:
    type: string
    description: 企业年报PDF文件路径列表，以逗号分隔，建议5-10份
    required: true
    default:
  output_path:
    type: string
    description: 最终研究报告输出路径
    required: true
    default:
outputs:
  report_path:
    type: string
    description: 生成的行业研究报告文件路径
    required: true
    default:
  bytes_written:
    type: string
    description: 写入的字节数
    required: true
    default:
steps:
- id: 1
  name: 读取PDF文件列表
  action: file_reader
  description: ''
  inputs:
    paths: '{{pdf_paths}}'
  outputs:
    pdf_contents: file_content
  condition:
  on_fail:
  max_retries: 3
  workflow:
- id: 2
  name: 提取财务摘要和战略描述
  action: llm_analyze
  description: ''
  inputs:
    content: '{{pdf_contents}}'
    instruction: "请从以下多份企业年报PDF内容中，为每家公司提取以下信息：\n1. 财务摘要：营收、利润、增长率（同比）\n2. 战略方向：公司未来3-5年的战略规划\n\
      3. 业务布局：主要业务板块、产品线、市场分布\n\n请按公司名称组织输出，确保数据准确，对于无法提取的信息标注'未提及'"
  outputs:
    extracted_data: analysis_result
    extract_confidence: confidence
  condition:
  on_fail:
  max_retries: 3
  workflow:
- id: 3
  name: 行业横向对比分析
  action: llm_analyze
  description: ''
  inputs:
    content: '{{extracted_data}}'
    instruction: "基于提取的各公司数据，进行行业横向对比分析：\n1. 财务对比：营收规模排名、利润率对比、增长趋势差异\n2. 战略对比：战略方向异同点、业务布局重叠与差异化\n\
      3. 竞争力分析：各公司在行业中的相对位置和竞争优势"
  outputs:
    comparison_analysis: analysis_result
    compare_confidence: confidence
  condition:
  on_fail:
  max_retries: 3
  workflow:
- id: 4
  name: 识别行业趋势和风险
  action: llm_analyze
  description: ''
  inputs:
    content: '{{comparison_analysis}}'
    instruction: "基于行业横向对比分析，识别：\n1. 行业整体发展趋势（技术、市场、政策等方面）\n2. 潜在风险因素（市场竞争、政策变化、技术迭代、供应链等）\n\
      3. 机遇窗口期（新兴市场、技术突破、政策红利等）"
  outputs:
    trends_risks: analysis_result
    trends_confidence: confidence
  condition:
  on_fail:
  max_retries: 3
  workflow:
- id: 5
  name: 生成SWOT分析
  action: llm_generate
  description: ''
  inputs:
    instruction: 基于行业趋势、风险和公司对比分析，生成一份全面的行业SWOT分析报告
    context: "行业关键词：{{industry_keyword}}\n公司数据：{{extracted_data}}\n行业对比：{{comparison_analysis}}\n\
      趋势风险：{{trends_risks}}"
  outputs:
    swot_analysis: generated_text
  condition:
  on_fail:
  max_retries: 3
  workflow:
- id: 6
  name: 验证SWOT分析质量
  action: llm_verify
  description: ''
  inputs:
    artifact: '{{swot_analysis}}'
    criteria: 
      SWOT须含优势、劣势、机会、威胁四块；每块至少两条具体条目；内容须与行业关键词「{{industry_keyword}}」相关，不得明显跑题到其他行业；不得出现未替换占位符。
  outputs:
    swot_verify_result: verify_result
    swot_passed: passed
  condition:
  on_fail: 5
  max_retries: 2
  workflow:
- id: 7
  name: 生成图文并茂研究报告
  action: llm_generate
  description: ''
  inputs:
    instruction: "请生成一份图文并茂的行业研究报告，包含以下章节：\n1. 行业概况（基于关键词）\n2. 样本公司财务摘要（表格形式）\n3.
      公司战略与业务布局对比\n4. 行业横向分析\n5. 行业趋势与风险识别\n6. SWOT分析\n7. 结论与建议\n\n请在适当位置添加图表描述（如：图1：营收规模对比柱状图；表1：财务数据汇总表），用Markdown格式输出，确保报告结构清晰、专业。"
    context: "行业关键词：{{industry_keyword}}\n公司数据：{{extracted_data}}\n行业对比：{{comparison_analysis}}\n\
      趋势风险：{{trends_risks}}\nSWOT分析：{{swot_analysis}}"
  outputs:
    report_content: generated_text
  condition:
  on_fail:
  max_retries: 3
  workflow:
- id: 8
  name: 验证报告完整性
  action: llm_verify
  description: ''
  inputs:
    artifact: '{{report_content}}'
    criteria: 
      报告须显式包含 7 个章节标题或等价结构（行业概况、财务摘要、战略对比、横向分析、趋势与风险、SWOT、结论与建议）；须有图表或表格类描述；Markdown 层级合理；不得出现未替换占位符；不得整篇为空壳套话。
  outputs:
    report_verify_result: verify_result
    report_passed: passed
  condition:
  on_fail: 7
  max_retries: 2
  workflow:
- id: 9
  name: 保存研究报告
  action: file_writer
  description: ''
  inputs:
    file_path: '{{output_path}}'
    content: '{{report_content}}'
  outputs:
    report_path: report_path
    bytes_written: bytes_written
  condition:
  on_fail:
  max_retries: 3
  workflow:
