name: ecommerce_seo_optimization
description: 读取电商商品Excel文件，提取SEO关键词，优化标题，生成卖点短语，输出优化后的文案表
version: '1.0'
inputs:
  excel_path:
    type: string
    description: 包含商品标题和详情页文案的Excel文件路径
    required: true
    default:
  output_path:
    type: string
    description: 优化后的文案表输出文件路径
    required: true
    default:
outputs:
  report_path:
    type: string
    description: 优化后的文案表文件路径
    required: true
    default:
steps:
- id: 1
  name: 读取Excel文件
  action: file_reader
  description: ''
  inputs:
    file_path: '{{excel_path}}'
  outputs:
    excel_content: file_content
  condition:
  on_fail:
  max_retries: 3
  workflow:
- id: 2
  name: 提取SEO关键词
  action: llm_analyze
  description: ''
  inputs:
    content: '{{excel_content}}'
    instruction: 分析这份电商商品Excel数据，提取每个商品的核心SEO关键词。请按商品逐条列出：1.商品标题 2.详情页文案 
      3.提取的关键词（3-5个核心词，按搜索热度排序）
  outputs:
    seo_analysis: analysis_result
    confidence: confidence
  condition:
  on_fail:
  max_retries: 3
  workflow:
- id: 3
  name: 优化商品标题
  action: llm_generate
  description: ''
  inputs:
    instruction: 基于SEO关键词分析结果，为每个商品优化标题以提升搜索权重。要求：1.保持原意 2.包含核心关键词 3.长度适中 4.吸引点击
    context: "原始Excel内容：{{excel_content}}\n\nSEO关键词分析：{{seo_analysis}}"
  outputs:
    optimized_titles: generated_text
  condition:
  on_fail:
  max_retries: 3
  workflow:
- id: 4
  name: 生成卖点短语
  action: llm_generate
  description: ''
  inputs:
    instruction: 为每个商品生成5条卖点短语，每条不超过15字。卖点应突出产品优势、解决用户痛点、激发购买欲望
    context: "原始Excel内容：{{excel_content}}\n\nSEO关键词分析：{{seo_analysis}}\n\n优化后的标题：{{optimized_titles}}"
  outputs:
    selling_points: generated_text
  condition:
  on_fail:
  max_retries: 3
  workflow:
- id: 5
  name: 验证优化质量
  action: llm_verify
  description: ''
  inputs:
    artifact: '{{optimized_titles}}'
    criteria: 优化后的标题必须基于原始商品内容，不得替换为无关商品；每个标题都应包含相关SEO关键词；标题长度应合理（通常20-60字）
  outputs:
    verify_result: verify_result
    passed: passed
  condition:
  on_fail: 3
  max_retries: 2
  workflow:
- id: 6
  name: 组装优化文案表
  action: file_writer
  description: ''
  inputs:
    file_path: '{{output_path}}'
    content: "# 电商商品SEO优化文案表\n\n## SEO关键词提取结果\n\n{{seo_analysis}}\n\n## 优化后的商品标题\n\
      \n{{optimized_titles}}\n\n## 商品卖点短语（每条5个）\n\n{{selling_points}}"
  outputs:
    report_path: report_path
    bytes_written: bytes_written
  condition:
  on_fail:
  max_retries: 3
  workflow:
