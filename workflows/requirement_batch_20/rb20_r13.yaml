name: multi_news_cross_check
description: 多篇同主题新闻稿交叉比对，识别事实差异和立场倾向，生成客观中立的综合简报
version: '1.0'
inputs:
  news_paths:
    type: string
    description: 新闻稿文件路径列表（逗号分隔），至少2篇
    required: true
    default:
  output_path:
    type: string
    description: 综合简报输出文件路径
    required: true
    default:
outputs:
  report_path:
    type: string
    description: 生成的综合简报文件路径
    required: true
    default:
steps:
- id: 1
  name: 读取多篇新闻稿
  action: file_reader
  description: ''
  inputs:
    paths: '{{news_paths}}'
  outputs:
    news_contents: file_content
  condition:
  on_fail:
  max_retries: 3
  workflow:
- id: 2
  name: 交叉比对分析
  action: llm_analyze
  description: ''
  inputs:
    content: '{{news_contents}}'
    instruction: 
      对以下多篇同主题新闻稿进行交叉比对分析：1.识别各报道之间的核心事实差异（时间、地点、人物、数据等）2.分析各报道的立场倾向（用词、语气、强调点）3.去重合并相同信息4.按事件发展逻辑整理时间线和关键事实。请结构化输出：第一部分列出所有事实差异点（标注来源），第二部分分析各报道立场倾向，第三部分整理去重后的客观事实时间线。
  outputs:
    cross_analysis: analysis_result
    confidence: confidence
  condition:
  on_fail:
  max_retries: 3
  workflow:
- id: 3
  name: 生成综合简报
  action: llm_generate
  description: ''
  inputs:
    instruction: 
      基于交叉比对分析结果，生成一篇客观中立的综合简报。要求：1.以事实为基础，避免主观评价2.清晰标注信息来源3.突出共识点和争议点4.语言简洁专业5.结构包括：事件概述、关键事实时间线、各报道差异点、综合结论。
    context: '{{cross_analysis}}'
  outputs:
    briefing_text: generated_text
  condition:
  on_fail:
  max_retries: 3
  workflow:
- id: 4
  name: 验证简报客观性
  action: llm_verify
  description: ''
  inputs:
    artifact: '{{briefing_text}}'
    criteria: 
      简报必须：1.基于分析中的事实差异和立场倾向信息2.保持客观中立，不添加未提及的主观评价3.清晰标注信息来源4.包含事件概述、关键事实时间线、差异点和综合结论5.不得偏向任何单一报道的立场
  outputs:
    verify_result: verify_result
    passed: passed
  condition:
  on_fail: 3
  max_retries: 2
  workflow:
- id: 5
  name: 保存综合简报
  action: file_writer
  description: ''
  inputs:
    file_path: '{{output_path}}'
    content: '{{briefing_text}}'
  outputs:
    report_path: report_path
    bytes_written: bytes_written
  condition:
  on_fail:
  max_retries: 3
  workflow:
