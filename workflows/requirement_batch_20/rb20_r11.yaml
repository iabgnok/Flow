name: user_ticket_analysis
description: 读取用户工单JSON文件，进行意图分类、实体提取，生成工单分析报告
version: '1.0'
inputs:
  tickets_file:
    type: string
    description: 用户工单JSON文件路径
    required: true
    default:
  report_path:
    type: string
    description: 分析报告输出路径
    required: true
    default:
outputs:
  report_path:
    type: string
    description: 生成的工单分析报告路径
    required: true
    default:
steps:
- id: 1
  name: 读取工单文件
  action: file_reader
  description: ''
  inputs:
    file_path: '{{tickets_file}}'
  outputs:
    tickets_json: file_content
  condition:
  on_fail:
  max_retries: 3
  workflow:
- id: 2
  name: 分类与实体提取
  action: llm_analyze
  description: ''
  inputs:
    content: '{{tickets_json}}'
    instruction: 分析以下用户工单JSON数据，完成以下任务：1. 对每条工单进行意图分类（咨询/投诉/建议/故障）2. 
      提取每条工单的关键实体：产品名、错误码、时间3. 以结构化格式输出，每条工单包含：工单ID、意图分类、产品名、错误码、时间
  outputs:
    analysis_result: analysis_result
    confidence: confidence
  condition:
  on_fail:
  max_retries: 3
  workflow:
- id: 3
  name: 生成汇总统计
  action: llm_generate
  description: ''
  inputs:
    instruction: 基于以下工单分析结果，生成汇总统计报告，包括：1. 各类意图数量及占比 2. 高频产品名统计 3. 常见错误码分布 4. 
      时间趋势分析（如有时间信息）5. 主要问题总结和建议
    context: '{{analysis_result}}'
  outputs:
    summary_report: generated_text
  condition:
  on_fail:
  max_retries: 3
  workflow:
- id: 4
  name: 验证报告完整性
  action: llm_verify
  description: ''
  inputs:
    artifact: '{{summary_report}}'
    criteria: 
      报告必须包含以下部分：意图分类统计、高频产品统计、错误码分布、时间趋势分析（如有）、问题总结和建议。报告内容必须基于输入工单数据，不得包含无关内容。
  outputs:
    verify_result: verify_result
    passed: passed
  condition:
  on_fail: 3
  max_retries: 2
  workflow:
- id: 5
  name: 保存分析报告
  action: file_writer
  description: ''
  inputs:
    file_path: '{{report_path}}'
    content: "# 用户工单分析报告\n\n## 工单分类与实体提取结果\n\n{{analysis_result}}\n\n## 汇总统计分析\n\n\
      {{summary_report}}"
  outputs:
    report_path: report_path
    bytes_written: bytes_written
  condition:
  on_fail:
  max_retries: 3
  workflow:
