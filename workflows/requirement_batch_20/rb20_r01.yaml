name: paper_translation_and_summary
description: 将英文论文PDF翻译成中文并生成摘要
version: '1.0'
inputs:
  pdf_path:
    type: string
    description: 英文论文PDF文件路径
    required: true
    default:
  output_path:
    type: string
    description: 翻译和摘要的输出文件路径
    required: true
    default:
outputs:
  report_path:
    type: string
    description: 包含中文翻译和摘要的报告文件路径
    required: true
    default:
steps:
- id: 1
  name: 读取PDF文件
  action: file_reader
  description: ''
  inputs:
    file_path: '{{pdf_path}}'
  outputs:
    paper_content: file_content
  condition:
  on_fail:
  max_retries: 3
  workflow:
- id: 2
  name: 翻译论文为中文
  action: llm_generate
  description: ''
  inputs:
    instruction: 将以下英文论文完整翻译为中文，保持学术风格和专业术语准确性
    context: '{{paper_content}}'
  outputs:
    translated_text: generated_text
  condition:
  on_fail:
  max_retries: 3
  workflow:
- id: 3
  name: 生成论文摘要
  action: llm_analyze
  description: ''
  inputs:
    content: '{{paper_content}}'
    instruction: 为这篇英文论文生成中文摘要，包括研究背景、方法、主要发现和结论，控制在300字以内
  outputs:
    summary: analysis_result
    confidence: confidence
  condition:
  on_fail:
  max_retries: 3
  workflow:
- id: 4
  name: 验证翻译质量
  action: llm_verify
  description: ''
  inputs:
    artifact: '{{translated_text}}'
    criteria: 翻译必须忠实于原文，专业术语准确，中文表达流畅自然，不得遗漏重要内容
  outputs:
    verify_result: verify_result
    passed: passed
  condition:
  on_fail: 2
  max_retries: 2
  workflow:
- id: 5
  name: 保存翻译和摘要
  action: file_writer
  description: ''
  inputs:
    file_path: '{{output_path}}'
    content: "# 论文中文翻译\n\n{{translated_text}}\n\n---\n\n# 论文摘要\n\n{{summary}}"
  outputs:
    report_path: report_path
    bytes_written: bytes_written
  condition:
  on_fail:
  max_retries: 3
  workflow:
